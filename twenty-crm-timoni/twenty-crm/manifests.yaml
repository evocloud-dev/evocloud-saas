apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: redis
    app.kubernetes.io/managed-by: timoni
    app.kubernetes.io/name: tc
    app.kubernetes.io/version: 0.0.0-devel
  name: tc-redis
  namespace: tc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
      app.kubernetes.io/name: tc
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
        app.kubernetes.io/instance: tc
        app.kubernetes.io/name: tc
    spec:
      automountServiceAccountToken: false
      containers:
      - args:
        - --port
        - "6379"
        - --maxmemory-policy
        - noeviction
        - --dir
        - /data
        command:
        - redis-stack-server
        image: redis/redis-stack-server:7.2.0-v10
        imagePullPolicy: IfNotPresent
        name: redis
        ports:
        - containerPort: 6379
          name: redis
        resources:
          limits:
            cpu: 500m
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 10001
          runAsNonRoot: true
          runAsUser: 10001
        volumeMounts:
        - mountPath: /tmp
          name: empty-dir
        - mountPath: /data
          name: redis-data
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: Always
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
      volumes:
      - emptyDir: {}
        name: empty-dir
      - name: redis-data
        persistentVolumeClaim:
          claimName: tc-redis
---
