{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hievents.componentName" (dict "root" . "component" "backend") }}
  labels:
    {{- include "hievents.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hievents.selectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hievents.podLabels" (dict "root" . "component" "backend") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if or .Values.commonAnnotations .Values.podAnnotations }}
        {{- include "hievents.podAnnotations" . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      {{- include "hievents.imagePullSecrets" $ | nindent 6 }}
      {{- end }}
      serviceAccountName: {{ include "hievents.serviceAccountName" . }}
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.initContainers.postgresql.enabled .Values.initContainers.redis.enabled }}
      initContainers:
        {{- if .Values.initContainers.postgresql.enabled }}
        {{- include "hievents.initContainers.waitForPostgresql" . | nindent 8 }}
        {{- end }}
        {{- if .Values.initContainers.redis.enabled }}
        {{- include "hievents.initContainers.waitForRedis" . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "hievents.image" .Values.backend.image | quote }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - php artisan storage:link || true
          {{- with .Values.backend.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
          env:
            {{- include "hievents.env.laravelVariables" . | nindent 12 }}
            {{- include "hievents.env.databaseVariables" . | nindent 12 }}
            {{- include "hievents.env.redisVariables" . | nindent 12 }}
            {{- include "hievents.env.s3Variables" . | nindent 12 }}
            - name: PORT
              value: {{ .Values.backend.service.targetPort | quote }}
            - name: APP_PORT
              value: {{ .Values.backend.service.targetPort | quote }}
          startupProbe:
            {{- if eq .Values.backend.probes.type "tcpSocket" }}
            tcpSocket:
              port: http
            {{- else if eq .Values.backend.probes.type "httpGet" }}
            httpGet:
              path: /
              port: http
            {{- end }}
            periodSeconds: {{ .Values.backend.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.probes.startup.failureThreshold }}
          livenessProbe:
            {{- if eq .Values.backend.probes.type "tcpSocket" }}
            tcpSocket:
              port: http
            {{- else if eq .Values.backend.probes.type "httpGet" }}
            httpGet:
              path: /
              port: http
            {{- end }}
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.probes.liveness.failureThreshold }}
          readinessProbe:
            {{- if eq .Values.backend.probes.type "tcpSocket" }}
            tcpSocket:
              port: http
            {{- else if eq .Values.backend.probes.type "httpGet" }}
            httpGet:
              path: /
              port: http
            {{- end }}
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.probes.readiness.failureThreshold }}
          {{- with .Values.backend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- include "hievents.backendStorageVolumeMounts" . | nindent 10 }}
      {{- include "hievents.backendStorageVolumes" . | nindent 6 }}
      {{- include "hievents.podScheduling" (dict "root" . "componentValues" .Values.backend) | nindent 6 }}
{{- end }}
