{{- if and .Values.backend.enabled .Values.backend.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "hievents.componentName" (dict "root" . "component" "backend") }}
  labels:
    {{- include "hievents.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  minAvailable: {{ .Values.backend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "hievents.selectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
{{- end }}
---
{{- if and .Values.frontend.enabled .Values.frontend.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "hievents.componentName" (dict "root" . "component" "frontend") }}
  labels:
    {{- include "hievents.componentLabels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  minAvailable: {{ .Values.frontend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "hievents.selectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
{{- end }}
