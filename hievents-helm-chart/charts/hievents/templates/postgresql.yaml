{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hievents.fullname" . }}-postgresql-headless
  labels:
    {{- include "hievents.componentLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: postgresql
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
  selector:
    {{- include "hievents.selectorLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hievents.fullname" . }}-postgresql
  labels:
    {{- include "hievents.componentLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
  selector:
    {{- include "hievents.selectorLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hievents.fullname" . }}-postgresql
  labels:
    {{- include "hievents.componentLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
spec:
  serviceName: {{ include "hievents.fullname" . }}-postgresql-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "hievents.selectorLabels" (dict "root" . "component" "postgresql") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hievents.podLabels" (dict "root" . "component" "postgresql") | nindent 8 }}
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.hieventsConfig.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.hieventsConfig.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hievents.postgresqlSecretName" . }}
                  key: {{ .Values.secrets.postgresql.passwordKey }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.postgresql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.postgresql.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          {{- end }}
  {{- if .Values.postgresql.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ .Values.postgresql.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
  {{- end }}
{{- end }}
